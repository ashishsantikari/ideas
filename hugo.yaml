baseURL: https://blog.ashishsantikari.info
languageCode: en-us
defaultContentLanguage: en
title: AS
theme: PaperMod
pagination:
  pagerSize: 5
  enableRobotsTXT: true
  buildDrafts: false
  buildFuture: false
  buildExpired: false
outputs:
  home:
    - HTML
    - RSS
    - JSON
minify:
  disableXML: true
  minifyOutput: true
params:
  env: production
  title: AS
  description: Micro blogging site by Ashish Santikari
  keywords:
    - Blog
    - Application Development
    - Software Engineering
    - Artificial Intelligence
  author: Ashish Santikari
  DateFormat: January 2, 2006
  defaultTheme: auto
  disableThemeToggle: false
  comments: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  DisableSpecial1stPost: false
  DisableScrollToTop: false
  HideMeta: false
  HideSummary: false
  ShowToc: true
  TocOpen: false
  utterances:
    enabled: true
    repo: ashishsantikari/ideas
    issueTerm: pathname
  assets: {}
  label:
    text: AS
  profileMode:
    enabled: true
    title: Ashish Santikari
    subtitle: Software Engineer
    imageUrl: ""
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
  homeInfoParams:
    Title: AS
    Content: worth sharing
  socialIcons:
    - name: twitter
      url: https://twitter.com/_jsdev
    - name: stackoverflow
      url: https://stackoverflow.com/users/3985206/ashish-santikari
    - name: github
      url: https://github.com/ashishsantikari
    - name: linkedin
      url: https://linkedin.com/in/asantikari
  cover:
    hidden: false
    hiddenInList: true
    hiddenInSingle: false
  editPost:
    disabled: true
    URL: https://github.com/ashishsantikari/ideas/content
    Text: Suggest Changes
    appendFilePath: true
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content
menu:
  main:
    # - identifier: search
    #   name: Search
    #   url: /search/
    #   weight: 5
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: archives
      name: Archive
      url: /archives/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: resume
      name: Resume
      url: /resume/
      weight: 40
    - identifier: labs
      name: Labs
      url: /labs/
      weight: 35
markup:
  highlight:
    noClasses: false
