{{- $gtmID := site.Params.gtmID -}}
{{- $gaID := site.Params.googleAnalyticsID -}}

<div id="cookie-notice">
  <span>We use third party cookies and scripts to improve the
    functionality of this website.</span>
  <a id="cookie-notice-accept" class="btn btn-primary btn-sm">Accept</a>
  <a id="cookie-notice-deny" class="btn btn-primary btn-sm">Deny</a>
  <a href="/privacy" title="Read privacy notice" class="btn btn-primary btn-sm">More details</a>
</div>
<script>
    function createCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + value + expires + "; path=/";
    }
    function readCookie(name) {
        var nameEQ = name + "=";
        var ca = document.cookie.split(';');
        for (var i = 0; i < ca.length; i++) {
            var c = ca[i];
            while (c.charAt(0) == ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }
    function eraseCookie(name) {
        createCookie(name, "", -1);
    }

    function loadAnalytics() {
        {{ if hugo.IsProduction | or (eq site.Params.env "production") | or (eq site.Params.env "deploy-preview") }}

        {{ with $gtmID }}
        /* Google Tag Manager */
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','{{ . }}');
        /* End Google Tag Manager */
        {{ end }}

        {{ with $gaID }}
        /* Google Analytics (GA4) */
        var gaScript = document.createElement('script');
        gaScript.async = true;
        gaScript.src = 'https://www.googletagmanager.com/gtag/js?id={{ . }}';
        document.head.appendChild(gaScript);

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ . }}');
        /* End Google Analytics */
        {{ end }}

        {{ end }}
    }

    if (readCookie('cookie-notice-option') == 'true') {
        loadAnalytics();
    } else if (readCookie('cookie-notice-option') != 'false') {
        document.getElementById('cookie-notice').style.display = 'block';
    }

    document.getElementById('cookie-notice-accept').addEventListener("click", function() {
        createCookie('cookie-notice-option', 'true', 31);
        document.getElementById('cookie-notice').style.display = 'none';
        location.reload();
    });

    document.getElementById('cookie-notice-deny').addEventListener("click", function() {
        createCookie('cookie-notice-option', 'false', 31);
        document.getElementById('cookie-notice').style.display = 'none';
        location.reload();
    });
</script>
